<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"> <!-- Necessário adicionar a especificação do thymeleaf-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simplificado</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .btn-custom {
            background-color: #212529;
            color: #ffffff;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-custom:hover {
            background-color: #33373b;
            color: #ffffff;
        }
        .btn-custom:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">

            <!-- Card de Login -->
            <div class="card login-card p-4 bg-white">
                <div class="card-body">

                    <!-- Cabeçalho -->
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark mb-1">Entrar</h2>
                        <p class="text-muted small">Digite suas credenciais para acessar</p>
                    </div>

                    <!-- Formulário -->
                    <form method="post" th:action="@{/login}"> <!-- necessário adicionar o metodo, e sua ação-->
                        <!-- Campo de Usuário -->
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold text-secondary">Usuário</label>
                            <div class="input-group">
                                <!-- necessário adicionar o campo name="username" no input-->
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control bg-light border-start-0" id="username" name="username" placeholder="Seu usuário" required>
                            </div>
                        </div>

                        <!-- Campo de Senha -->
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-semibold text-secondary">Senha</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                <!-- necessário adicionar o campo name="password" no input-->
                                <input type="password" class="form-control bg-light border-start-0" id="password" name="password" placeholder="Sua senha" required>
                            </div>
                        </div>

                        <!-- Botão de Entrar -->
                        <button type="submit" class="btn btn-custom w-100 py-2.5 fw-semibold rounded-3 shadow-sm">
                            Acessar Sistema
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
